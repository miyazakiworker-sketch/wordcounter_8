<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO最適化！文字数＆キーワード一瞬カウンター</title>
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: #1e293b;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto 25px auto;
        }

        h1 {
            color: #38bdf8; 
            font-size: 20px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .keyword-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            text-align: left;
            flex-direction: column;
        }
        .keyword-input-area label {
            font-size: 12px;
            font-weight: bold;
            color: #cbd5e1;
        }
        #target-keyword {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #475569;
            border-radius: 8px;
            font-size: 14px;
            background-color: #0f172a;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        #target-keyword:focus { border-color: #38bdf8; }

        #text-input {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #475569;
            border-radius: 12px;
            font-size: 14px;
            background-color: #0f172a;
            color: white;
            outline: none;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        #text-input:focus { border-color: #38bdf8; }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-card {
            background-color: #334155;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .card-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .card-value {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }
        .card-value.highlight { color: #34d399; }

        .result-card style { grid-column: span 2; }
        #res-density-box { grid-column: span 2; }

        .advice-box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            border-left: 4px solid #38bdf8;
            margin-bottom: 15px;
        }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #1e293b;
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .ad-label { font-size: 11px; font-weight: bold; color: #475569; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #64748b; line-height: 1.4; }

        .author-box {
            max-width: 440px;
            width: 100%;
            text-align: center;
            margin: 0 auto;
        }
        .author-link {
            font-size: 12px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
        .author-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEO文字数＆キーワードカウンター</h1>
        <div class="subtitle">文章のボリュームとキーワード比率をリアルタイム計測</div>
        
        <div class="keyword-input-area">
            <label>🎯 SEOで狙いたい重要キーワード（1つ）</label>
            <input type="text" id="target-keyword" value="CAD" placeholder="例：フリーランス、CAD、SEO">
        </div>

        <textarea id="text-input" placeholder="ここに調査したい記事の文章を貼り付けてね（リアルタイムで自動計算されます）"></textarea>

        <div class="result-grid">
            <div class="result-card">
                <div class="card-label">総文字数 (スペース含む)</div>
                <div class="card-value" id="res-chars">0</div>
            </div>
            <div class="result-card">
                <div class="card-label">キーワード出現回数</div>
                <div class="card-value highlight" id="res-count">0 回</div>
            </div>
            <div id="res-density-box" class="result-card">
                <div class="card-label">キーワード出現率（狙い目：2%〜3%）</div>
                <div class="card-value" id="res-density" style="color: #fbc531;">0.00 %</div>
            </div>
        </div>

        <div class="advice-box" id="advice-text">
            💡 上のボックスに文章を入力すると、SEO効果を高めるためのプロの自動アドバイスがここに表示されます。
        </div>

        <button id="copy-btn">このSEO分析結果をコピーする 📋</button>
    </div>

    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <div class="author-box">
        <a class="author-link" href="https://x.com" target="_blank">
            🛠️ 開発者：ココア (プロのフリーランスへの成長記録はコチラ) 🛠️
        </a>
    </div>

   <script>
    // 既存のパーツ
    const textarea = document.getElementById("target-text");
    const keywordInput = document.getElementById("keyword-input");
    const charCountSpan = document.getElementById("char-count");
    const keywordCountSpan = document.getElementById("keyword-count");
    const keywordPercentSpan = document.getElementById("keyword-percent");
    const seoAdviceDiv = document.getElementById("seo-advice");
    const copyBtn = document.getElementById("copy-btn");

    // 【新機能】タイトル・ディスクリプション用のパーツ
    const titleInput = document.getElementById("title-input") || { value: "" };
    const descInput = document.getElementById("desc-input") || { value: "" };
    const titleCount = document.getElementById("title-count");
    const descCount = document.getElementById("desc-count");
    const titleBar = document.getElementById("title-bar");
    const descBar = document.getElementById("desc-bar");

    let shareText = "";

    function analyzeText() {
        const text = textarea.value;
        const keyword = keywordInput.value.trim();
        const titleText = titleInput.value;
        const descText = descInput.value;
        
        // 1. 本文文字数の反映
        charCountSpan.innerText = text.length;

        // 2. 【新機能】タイトル・ディスクリプションの文字数＆バー監視
        if (titleCount) titleCount.innerText = titleText.length;
        if (descCount) descCount.innerText = descText.length;
        
        if (titleBar) {
            titleBar.style.width = Math.min((titleText.length / 32) * 100, 100) + "%";
            titleBar.style.backgroundColor = titleText.length > 32 ? "#e74c3c" : "#2ecc71";
        }
        if (descBar) {
            descBar.style.width = Math.min((descText.length / 120) * 100, 100) + "%";
            descBar.style.backgroundColor = descText.length > 120 ? "#e74c3c" : "#2ecc71";
        }

        if (!keyword) {
            keywordCountSpan.innerText = "0";
            keywordPercentSpan.innerText = "0.0";
            seoAdviceDiv.innerHTML = "💡 狙いたいSEOキーワードを入力してください。";
            seoAdviceDiv.style.color = "#333";
            return;
        }

        // 3. キーワード出現数のカウント（giロジック）
        const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(escapedKeyword, "gi");
        const matches = text.match(regex);
        const count = matches ? matches.length : 0;
        keywordCountSpan.innerText = count;

        // 4. 出現比率（％）の計算
        const percent = text.length > 0 ? ((count * keyword.length) / text.length) * 100 : 0;
        keywordPercentSpan.innerText = percent.toFixed(1);

        // 5. アドバイス切り替え
        if (count === 0) {
            seoAdviceDiv.innerHTML = "⚠️ キーワードが記事内に含まれていません！";
            seoAdviceDiv.style.color = "#e74c3c";
        } else if (percent < 2.0) {
            seoAdviceDiv.innerHTML = "📉 キーワード比率が低め（2%未満）です。見出し等に追加しましょう。";
            seoAdviceDiv.style.color = "#e67e22";
        } else if (percent >= 2.0 && percent <= 3.5) {
            seoAdviceDiv.innerHTML = "🎯 【黄金比率】キーワード比率が2%〜3.5%の適正範囲です！";
            seoAdviceDiv.style.color = "#2ecc71";
        } else {
            seoAdviceDiv.innerHTML = "🚨 【入れすぎ注意】比率が過剰（3.5%超）です！ペナルティリスクがあります。";
            seoAdviceDiv.style.color = "#e74c3c";
        }

        shareText = `【SEO一瞬カウンター分析】\n本文: ${text.length}文字\nキーワード: 「${keyword}」\n出現: ${count}回 (${percent.toFixed(1)}%)\nURLアプデ後も一生同じ！`;
    }

    // すべての入力をリアルタイム監視
    textarea.addEventListener("input", analyzeText);
    keywordInput.addEventListener("input", analyzeText);
    if (titleInput.addEventListener) titleInput.addEventListener("input", analyzeText);
    if (descInput.addEventListener) descInput.addEventListener("input", analyzeText);

    copyBtn.addEventListener("click", () => {
        if (!textarea.value) { alert("⚠️ 文章を入力してください！"); return; }
        navigator.clipboard.writeText(shareText).then(() => {
            alert("📋 X報告用の文章をコピーしました！");
        }).catch(() => { alert("⚠️ コピーに失敗しました。"); });
    });
</script>

</body>
</html>
