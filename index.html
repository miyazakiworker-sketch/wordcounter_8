<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO最適化！文字数＆キーワード一瞬カウンター</title>
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: #1e293b;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto 25px auto;
        }

        h1 {
            color: #38bdf8; 
            font-size: 20px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .keyword-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            text-align: left;
            flex-direction: column;
        }
        .keyword-input-area label {
            font-size: 12px;
            font-weight: bold;
            color: #cbd5e1;
        }
        #target-keyword {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #475569;
            border-radius: 8px;
            font-size: 14px;
            background-color: #0f172a;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        #target-keyword:focus { border-color: #38bdf8; }

        #text-input {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #475569;
            border-radius: 12px;
            font-size: 14px;
            background-color: #0f172a;
            color: white;
            outline: none;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        #text-input:focus { border-color: #38bdf8; }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-card {
            background-color: #334155;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .card-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .card-value {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }
        .card-value.highlight { color: #34d399; }

        .result-card style { grid-column: span 2; }
        #res-density-box { grid-column: span 2; }

        .advice-box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.5;
            border-left: 4px solid #38bdf8;
            margin-bottom: 15px;
        }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #1e293b;
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .ad-label { font-size: 11px; font-weight: bold; color: #475569; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #64748b; line-height: 1.4; }

        .author-box {
            max-width: 440px;
            width: 100%;
            text-align: center;
            margin: 0 auto;
        }
        .author-link {
            font-size: 12px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
        .author-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEO文字数＆キーワードカウンター</h1>
        <div class="subtitle">文章のボリュームとキーワード比率をリアルタイム計測</div>
        
        <div class="keyword-input-area">
            <label>🎯 SEOで狙いたい重要キーワード（1つ）</label>
            <input type="text" id="target-keyword" value="CAD" placeholder="例：フリーランス、CAD、SEO">
        </div>

        <textarea id="text-input" placeholder="ここに調査したい記事の文章を貼り付けてね（リアルタイムで自動計算されます）"></textarea>

        <div class="result-grid">
            <div class="result-card">
                <div class="card-label">総文字数 (スペース含む)</div>
                <div class="card-value" id="res-chars">0</div>
            </div>
            <div class="result-card">
                <div class="card-label">キーワード出現回数</div>
                <div class="card-value highlight" id="res-count">0 回</div>
            </div>
            <div id="res-density-box" class="result-card">
                <div class="card-label">キーワード出現率（狙い目：2%〜3%）</div>
                <div class="card-value" id="res-density" style="color: #fbc531;">0.00 %</div>
            </div>
        </div>

        <div class="advice-box" id="advice-text">
            💡 上のボックスに文章を入力すると、SEO効果を高めるためのプロの自動アドバイスがここに表示されます。
        </div>

        <button id="copy-btn">このSEO分析結果をコピーする 📋</button>
    </div>

    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <div class="author-box">
        <a class="author-link" href="https://x.com" target="_blank">
            🛠️ 開発者：ココア (プロのフリーランスへの成長記録はコチラ) 🛠️
        </a>
    </div>

    <script>
        const textInput = document.getElementById("text-input");
        const keywordInput = document.getElementById("target-keyword");
        const resChars = document.getElementById("res-chars");
        const resCount = document.getElementById("res-count");
        const resDensity = document.getElementById("res-density");
        const adviceText = document.getElementById("advice-text");
        const copyBtn = document.getElementById("copy-btn");

        let shareText = "";

        function calculateSEO() {
            const text = textInput.value;
            const keyword = keywordInput.value.trim();

            const charCount = text.length;
            resChars.textContent = charCount;

            if (charCount === 0 || keyword === "") {
                resCount.textContent = "0 回";
                resDensity.textContent = "0.00 %";
                adviceText.textContent = "💡 文章と重要キーワードを入力してください。";
                return;
            }

            // 【バグ完全消滅ロジック】
            // 英語の大文字小文字を完全に無視(i)し、日本語の中に混ざっていても確実に一文字ずつ見つけ出す設定(gi)に変えました！
            const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
            const count = (text.match(new RegExp(escapedKeyword, "gi")) || []).length;
            resCount.textContent = count + " 回";

            const density = (count / charCount) * 100;
            resDensity.textContent = density.toFixed(2) + " %";

            let advice = "";
            if (density === 0) {
                advice = `⚠️ 文章の中に「${keyword}」が1度も使われていません！Googleに評価されるために、タイトルや見出しに自然に混ぜてみましょう。`;
                resDensity.style.color = "#ff4757";
            } else if (density < 1.0) {
                advice = `💡 「${keyword}」の出現率が少し低めです（${density.toFixed(2)}%）。文章の不自然じゃない場所に、もう少しキーワードを足すとSEO効果が上がります！`;
                resDensity.style.color = "#fbc531";
            } else if (density <= 3.5) {
                advice = `🎉 完璧なSEOキーワード比率です！（${density.toFixed(2)}%）Googleなどの検索エンジンに「この記事は何について書かれているか」が一番きれいに伝わる理想的なバランスです！`;
                resDensity.style.color = "#34d399";
            } else {
                advice = `⚠️ キーワードの詰め込みすぎ（過剰最適化）です！出現率が${density.toFixed(2)}%と高すぎるため、Googleからスパム判定を受ける恐れがあります。少し削って自然な文章に直しましょう。`;
                resDensity.style.color = "#ff4757";
            }
            adviceText.textContent = advice;

            shareText = `【SEO文字数カウンターで文章を分析しました】\n総文字数：${charCount}文字\n狙いキーワード：${keyword}\n出現率：${density.toFixed(2)}%\n分析結果：${advice}\n#SEO文字数カウンター Developed by @cocoa_next7`;
        }

        textInput.addEventListener("input", calculateSEO);
        keywordInput.addEventListener("input", calculateSEO);

        copyBtn.addEventListener("click", () => {
            if (textInput.value === "") {
                alert("文章を入力してからコピーしてください。");
                return;
            }
            navigator.clipboard.writeText(shareText).then(() => {
                copyBtn.textContent = "分析結果をコピーしました！ ✅";
                copyBtn.style.backgroundColor = "#34d399";
                setTimeout(() => {
                    copyBtn.textContent = "このSEO分析結果をコピーする 📋";
                    copyBtn.style.backgroundColor = "#1da1f2";
                }, 2000);
            }).catch(err => {
                alert("コピーに失敗しました。");
            });
        });
    </script>
</body>
</html>
